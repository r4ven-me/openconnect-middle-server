  openconnect:
    # depends_on:
    #   certbot:
    #     condition: service_completed_successfully
    build:
      context: .
      dockerfile: Dockerfile
    image: r4venme/openconnect:v1.4-client
    container_name: openconnect
    restart: always
    stop_grace_period: 30s
    cpus: 1
    mem_limit: 512M
    cap_add:
      - NET_ADMIN
      - NET_RAW
    hostname: openconnect
    env_file:
      - .env
    volumes:
      - ./data/:/etc/ocserv
      # - ${OC_CLIENT_0_CERT_FILE}:${OC_CLIENT_0_CERT_FILE}
      # - /etc/iproute2/rt_tables:/etc/iproute2/rt_tables
      # - /etc/passwd:/etc/passwd:ro
      # - /etc/group:/etc/group:ro
      # - /etc/shadow:/etc/shadow:ro
    devices:
      - /dev/net/tun:/dev/net/tun
      - /dev/vhost-net:/dev/vhost-net
    ports:
      - "${OC_SRV_PORT}:${OC_SRV_PORT}/tcp"
