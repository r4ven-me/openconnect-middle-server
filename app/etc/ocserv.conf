auth = "certificate"
#auth = "plain[passwd=/etc/ocserv/ocpasswd]"
#auth = "plain[passwd=/etc/ocserv/ocpasswd,otp=/etc/ocserv/secrets/users.oath]"
#enable-auth = "certificate"
#enable-auth = "pam"
pid-file = /var/run/ocserv.pid
socket-file = /var/run/ocserv.socket
isolate-workers = true
max-clients = 100
max-same-clients = 10
rate-limit-ms = 200
server-stats-reset-time = 604800
keepalive = 30
dpd = 90
mobile-dpd = 1800
switch-to-tcp-timeout = 25
try-mtu-discovery = false
cert-user-oid = 0.9.2342.19200300.100.1.1
tls-priorities = "NORMAL:%SERVER_PRECEDENCE:%COMPAT:-VERS-SSL3.0:-VERS-TLS1.0:-VERS-TLS1.1:-VERS-TLS1.3"
auth-timeout = 240
ban-time = 300
max-ban-score = 80
ban-reset-time = 1200
cookie-timeout = 600
deny-roaming = false
rekey-time = 172800
rekey-method = ssl
use-occtl = true
log-level = 1
#   0 default (Same as info)
#   1 basic
#   2 info
#   3 debug
#   4 http
#   8 sensitive
#   9 TLS
device = oc
predictable-ips = true
tunnel-all-dns = true
ping-leases = false
cisco-client-compat = true
no-udp = true
dtls-legacy = true
client-bypass-protocol = false
# route-add-cmd = "/usr/libexec/ocserv-fw-nftables"
# route-del-cmd = "/usr/libexec/ocserv-fw-nftables"
